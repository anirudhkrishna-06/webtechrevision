<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Hotel Booking System</title>
</head>
<body>
    <div class="page-container">
        
        <main class="container">
            <div class="form-container">
                <h2>Booking Details</h2>
                <form id="bookingForm">                       
                        <div class="form-group">
                            <label for="name">Full Name *</label>
                            <input type="text" id="name" placeholder="Enter your full name">
                            <small class="error" id="nameError"></small>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">Email Address *</label>
                            <input type="text" id="email" placeholder="example@domain.com">
                            <small class="error" id="emailError"></small>
                        </div>
                        
                        <div class="form-group">
                            <label for="mobile">Mobile Number *</label>
                            <input type="tel" id="mobile" placeholder="10-digit number">
                            <small class="error" id="mobileError"></small>
                        </div>
                                        
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="checkin">Check-in Date *</label>
                                <input type="date" id="checkin">
                                <small class="error" id="checkinError"></small>
                            </div>
                            
                            <div class="form-group">
                                <label for="checkout">Check-out Date *</label>
                                <input type="date" id="checkout">
                                <small class="error" id="checkoutError"></small>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="guests">Number of Guests *</label>
                                <input type="number" id="guests" min="1" max="6" value="1">
                                <small class="error" id="guestsError"></small>
                            </div>
                            
                            <div class="form-group">
                                <label for="room">Room Type *</label>
                                <select id="room">
                                    <option value="">Select Room Type</option>
                                    <option value="single">Single Room ($99/night)</option>
                                    <option value="double">Double Room ($149/night)</option>
                                    <option value="suite">Suite ($249/night)</option>
                                </select>
                                <small class="error" id="roomError"></small>
                            </div>
                        </div>
                    
                    
                    <button type="submit" class="submit-btn">Book Now</button>
                </form>
                
                <div id="successMsg" class="success-message"></div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
